name: Auto-Merge docs-vnext PRs

on:
  pull_request:
    types: [opened, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  auto-merge:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'docs-vnext') &&
      contains(github.event.pull_request.labels.*.name, 'automation')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --repo ${{ github.repository }}
