name: Build Foundry Docs Vnext MCP Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.vnext'
      - 'foundry_docs_vnext_mcp/**'
      - 'foundry_docs_mcp/**'
      - 'docs-vnext/**'
      - 'pyproject.toml'
  workflow_dispatch:

concurrency:
  group: docker-build-vnext
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/foundry-docs-vnext

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6
        with:
          context: .
          file: Dockerfile.vnext
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
